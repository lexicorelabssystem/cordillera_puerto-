global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - /etc/prometheus/alerts.yml
scrape_configs:
  - job_name: cordillera-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:4000"]
  - job_name: cordillera-host
    static_configs:
      - targets: ["node-exporter:9100"]
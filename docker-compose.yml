services:
  postgres:
    image: postgres:16-alpine
    container_name: cordillera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cordillera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cordillera_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-cordillera_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cordillera -d cordillera_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cordillera-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cordillera-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-cordillera}:${POSTGRES_PASSWORD:-cordillera_dev_2026}@postgres:5432/${POSTGRES_DB:-cordillera_dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido en produccion}
      JWT_ISSUER: cordillera-saas
      JWT_AUDIENCE: cordillera-app
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cordillera.cl}
      NOTIFICATION_EMAILS_ENABLED: ${NOTIFICATION_EMAILS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-cordillera}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-cordillera_minio_2026}
      MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-educacore-documents}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-educacore-temp}
      MINIO_ARCHIVES_BUCKET: ${MINIO_ARCHIVES_BUCKET:-educacore-archives}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cordillera-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: cordillera-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cordillera}:${POSTGRES_PASSWORD:-cordillera_dev_2026}@postgres:5432/${POSTGRES_DB:-cordillera_dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido en produccion}
      JWT_ISSUER: cordillera-saas
      JWT_AUDIENCE: cordillera-app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-cordillera}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-cordillera_minio_2026}
      MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-educacore-documents}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-educacore-temp}
      MINIO_ARCHIVES_BUCKET: ${MINIO_ARCHIVES_BUCKET:-educacore-archives}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cordillera-net

  redis:
    image: redis:7-alpine
    container_name: cordillera-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cordillera-net

  minio:
    image: minio/minio:latest
    container_name: cordillera-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-cordillera}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-cordillera_minio_2026}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cordillera-net
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: cordillera-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cordillera-net

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: cordillera-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - cordillera-net
  grafana:
    image: grafana/grafana:11.6.0
    container_name: cordillera-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-AdminObservability2026!}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cordillera-net
  backup:
    image: postgres:16-alpine
    container_name: cordillera-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-cordillera}
      PGPASSWORD: ${POSTGRES_PASSWORD:-cordillera_dev_2026}
      PGDATABASE: ${POSTGRES_DB:-cordillera_dev}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: 30
      BACKUP_CRON_SCHEDULE: "0 3 * * *"
    volumes:
      - backups:/backups
      - ./scripts/backup-entrypoint.sh:/usr/local/bin/backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-entrypoint.sh"]
    networks:
      - cordillera-net

  # Opcional: pgAdmin para administración de base de datos
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cordillera-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cordillera.cl
      PGADMIN_DEFAULT_PASSWORD: AdminDev2026*
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cordillera-net
    profiles:
      - dev

  nginx:
    image: nginx:alpine
    container_name: cordillera-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - cordillera-net

volumes:
  pgdata:
    driver: local
  backups:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  miniodata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local

networks:
  cordillera-net:
    driver: bridge

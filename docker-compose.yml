services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: cordillera-postgres:16-pgbackrest
    container_name: cordillera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER requerido}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB requerido}
      PGBACKREST_STANZA: cordillera
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_REPO1_TYPE: s3
      PGBACKREST_REPO1_PATH: /cordillera/postgresql
      PGBACKREST_REPO1_S3_BUCKET: ${PITR_S3_BUCKET:?PITR_S3_BUCKET requerido}
      PGBACKREST_REPO1_S3_ENDPOINT: ${PITR_S3_ENDPOINT:?PITR_S3_ENDPOINT requerido}
      PGBACKREST_REPO1_S3_REGION: ${PITR_S3_REGION:-us-east-1}
      PGBACKREST_REPO1_S3_KEY: ${PITR_S3_KEY:?PITR_S3_KEY requerido}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PITR_S3_SECRET:?PITR_S3_SECRET requerido}
      PGBACKREST_REPO1_S3_URI_STYLE: ${PITR_S3_URI_STYLE:-host}
      PGBACKREST_REPO1_CIPHER_TYPE: aes-256-cbc
      PGBACKREST_REPO1_CIPHER_PASS: ${PITR_REPO_CIPHER_PASS:?PITR_REPO_CIPHER_PASS requerido}
      PGBACKREST_REPO1_RETENTION_FULL: ${PITR_RETENTION_FULL:-4}
      PGBACKREST_REPO1_RETENTION_DIFF: ${PITR_RETENTION_DIFF:-14}
      PGBACKREST_COMPRESS_TYPE: zst
      PGBACKREST_PROCESS_MAX: ${PITR_PROCESS_MAX:-2}
      PGBACKREST_LOCK_PATH: /var/lib/postgresql/data/pgbackrest-lock
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - postgres_socket:/var/run/postgresql
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=${PITR_ARCHIVE_TIMEOUT:-60s}
      - -c
      - archive_command=pgbackrest --stanza=cordillera archive-push %p
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cordillera-private

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cordillera-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido en produccion}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET requerido}
      JWT_ISSUER: cordillera-saas
      JWT_AUDIENCE: cordillera-app
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ENABLE_DEMO_SEED: false
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS requerido}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@educacor.cl}
      NOTIFICATION_EMAILS_ENABLED: ${NOTIFICATION_EMAILS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY requerido}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY requerido}
      MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-educacore-documents}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-educacore-temp}
      MINIO_ARCHIVES_BUCKET: ${MINIO_ARCHIVES_BUCKET:-educacore-archives}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL requerido}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-4000}:4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cordillera-public
      - cordillera-private

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: cordillera-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido en produccion}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET requerido}
      JWT_ISSUER: cordillera-saas
      JWT_AUDIENCE: cordillera-app
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ENABLE_DEMO_SEED: false
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS requerido}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL requerido}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY requerido}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY requerido}
      MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-educacore-documents}
      MINIO_TEMP_BUCKET: ${MINIO_TEMP_BUCKET:-educacore-temp}
      MINIO_ARCHIVES_BUCKET: ${MINIO_ARCHIVES_BUCKET:-educacore-archives}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cordillera-public
      - cordillera-private

  redis:
    image: redis:7-alpine
    container_name: cordillera-redis
    restart: unless-stopped
    ports:
      - "${REDIS_BIND_ADDRESS:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cordillera-private

  minio:
    image: minio/minio:latest
    container_name: cordillera-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY requerido}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY requerido}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cordillera-private

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: cordillera-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cordillera-private

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: cordillera-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - cordillera-private

  grafana:
    image: grafana/grafana:11.6.0
    container_name: cordillera-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER requerido}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requerido}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_HOST_PORT:-3001}:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cordillera-private

  backup:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: cordillera-postgres:16-pgbackrest
    container_name: cordillera-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:?POSTGRES_USER requerido}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      PGDATABASE: ${POSTGRES_DB:?POSTGRES_DB requerido}
      PGBACKREST_STANZA: cordillera
      PGBACKREST_PG1_PATH: /var/lib/postgresql/data
      PGBACKREST_REPO1_TYPE: s3
      PGBACKREST_REPO1_PATH: /cordillera/postgresql
      PGBACKREST_REPO1_S3_BUCKET: ${PITR_S3_BUCKET:?PITR_S3_BUCKET requerido}
      PGBACKREST_REPO1_S3_ENDPOINT: ${PITR_S3_ENDPOINT:?PITR_S3_ENDPOINT requerido}
      PGBACKREST_REPO1_S3_REGION: ${PITR_S3_REGION:-us-east-1}
      PGBACKREST_REPO1_S3_KEY: ${PITR_S3_KEY:?PITR_S3_KEY requerido}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PITR_S3_SECRET:?PITR_S3_SECRET requerido}
      PGBACKREST_REPO1_S3_URI_STYLE: ${PITR_S3_URI_STYLE:-host}
      PGBACKREST_REPO1_CIPHER_TYPE: aes-256-cbc
      PGBACKREST_REPO1_CIPHER_PASS: ${PITR_REPO_CIPHER_PASS:?PITR_REPO_CIPHER_PASS requerido}
      PGBACKREST_REPO1_RETENTION_FULL: ${PITR_RETENTION_FULL:-4}
      PGBACKREST_REPO1_RETENTION_DIFF: ${PITR_RETENTION_DIFF:-14}
      PGBACKREST_COMPRESS_TYPE: zst
      PGBACKREST_PROCESS_MAX: ${PITR_PROCESS_MAX:-2}
      PGBACKREST_LOCK_PATH: /var/lib/postgresql/data/pgbackrest-lock
      PITR_FULL_BACKUP_DAY: ${PITR_FULL_BACKUP_DAY:-7}
      PITR_BACKUP_HOUR: ${PITR_BACKUP_HOUR:-2}
      PITR_CHECK_INTERVAL_SECONDS: ${PITR_CHECK_INTERVAL_SECONDS:-300}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_CRON_SCHEDULE: "${BACKUP_CRON_SCHEDULE:-0 3 * * *}"
    volumes:
      - backups:/backups
      - pgdata:/var/lib/postgresql/data
      - postgres_socket:/var/run/postgresql
      - pitr_state:/var/lib/pgbackrest
      - ./scripts/backup-entrypoint.sh:/usr/local/bin/backup-entrypoint.sh:ro
      - ./scripts/pgbackrest-scheduler.sh:/usr/local/bin/pgbackrest-scheduler.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: /bin/sh /usr/local/bin/backup-entrypoint.sh & /bin/sh /usr/local/bin/pgbackrest-scheduler.sh
    networks:
      - cordillera-private

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: cordillera-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cordillera.cl}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD requerido}
    ports:
      - "${PGADMIN_BIND_ADDRESS:-127.0.0.1}:${PGADMIN_HOST_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cordillera-private
    profiles:
      - dev

  nginx:
    image: nginx:alpine
    container_name: cordillera-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_BIND_ADDRESS:-0.0.0.0}:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - cordillera-public
      - cordillera-private

volumes:
  pgdata:
    driver: local
  backups:
    driver: local
  postgres_socket:
    driver: local
  pitr_state:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  miniodata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local

networks:
  cordillera-public:
    driver: bridge
  cordillera-private:
    driver: bridge
    internal: true

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cordillera SaaS - Sin Conexion</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .offline-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        padding: 48px 32px;
        max-width: 400px;
        text-align: center;
        width: 100%;
      }
      .offline-card__icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      .offline-card h1 {
        font-size: 1.4rem;
        color: #1e40af;
        margin-bottom: 8px;
      }
      .offline-card p {
        font-size: 0.92rem;
        color: #64748b;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .offline-card button {
        background: #1e40af;
        color: #fff;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 600;
      }
      .offline-card button:hover {
        background: #1e3a8a;
      }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <div class="offline-card__icon">&#127760;</div>
      <h1>Sin conexion a Internet</h1>
      <p>No pudimos conectar con el servidor. Algunas funciones pueden estar limitadas hasta que se restablezca la conexion.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
